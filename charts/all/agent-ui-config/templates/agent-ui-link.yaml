---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: agent-ui-link
  namespace: {{ .Values.agentui.namespace }}
spec:
  applicationMenu:
    section: AI Agent Platform
    imageURL: data:image/svg+xml;base64,
  href: 'https://agent-ui-{{ .Values.agentui.namespace }}.{{ coalesce .Values.global.localClusterDomain .Values.global.hubClusterDomain }}'
  location: ApplicationMenu
  text: 'AI Agent Chat UI'
