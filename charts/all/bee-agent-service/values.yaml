global:
  localClusterDomain: example.com
  hubClusterDomain: example.com
  model:
    vllm: ibm-granite/granite-4.0-h-small
  agent:
    mode: both
    enabledAgents: ""
    customAgentsDir: ""

replicaCount: 1

image:
  repository: quay.io/validatedpatterns/bee-agent-service
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 9999
  metricsPort: 8000

route:
  enabled: true

serviceAccount:
  create: true
  name: bee-agent-sa

rbac:
  create: true

env:
  VLLM_BASE_URL: "http://vllm-inference-service-predictor.ai-agent.svc.cluster.local:8080/v1"
  OPENAI_API_KEY: "EMPTY"
  SAMPLE_API_URL: "http://sample-api.ai-agent.svc.cluster.local:8080"

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

customAgents:
  enabled: false
  mountPath: /custom-agents
  configMapName: custom-agents
