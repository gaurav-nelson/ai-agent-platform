apiVersion: apps/v1
kind: Deployment
metadata:
  name: bee-agent-service
  labels:
    app.kubernetes.io/name: bee-agent-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: bee-agent-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bee-agent-service
        app.kubernetes.io/instance: {{ .Release.Name }}
        app: bee-agent-service
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: bee-agent-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: bee-agent-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.customAgents.enabled }}
          volumeMounts:
            - name: custom-agents
              mountPath: {{ .Values.customAgents.mountPath }}
              readOnly: true
          {{- end }}
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
      {{- if .Values.customAgents.enabled }}
      volumes:
        - name: custom-agents
          configMap:
            name: {{ .Values.customAgents.configMapName }}
      {{- end }}
