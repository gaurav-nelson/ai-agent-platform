apiVersion: v1
kind: Service
metadata:
  name: sample-api
  labels:
    app.kubernetes.io/name: sample-api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: sample-api
