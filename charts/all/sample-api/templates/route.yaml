{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sample-api
  labels:
    app.kubernetes.io/name: sample-api
spec:
  host: sample-api-{{ .Release.Namespace }}.{{ coalesce .Values.global.localClusterDomain .Values.global.hubClusterDomain }}
  to:
    kind: Service
    name: sample-api
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
